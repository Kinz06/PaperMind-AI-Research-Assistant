version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: papermind-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - papermind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

  papermind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: papermind-app
    ports:
      - "8501:8501" 
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - USE_LOCAL_LLM=true
      - LLM_MODEL=llama3.2:3b
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - papermind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  ollama-data:
    driver: local

networks:
  papermind-network:
    driver: bridge